name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'client/src/**'
      - 'client/package.json'
      - '.github/workflows/release.yaml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0). Leave blank to bump patch.'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install server dependencies
        run: npm i

      - name: Install client dependencies
        working-directory: client
        run: npm i

      - name: Test server package
        run: npm test --if-present

      - name: Test client package
        working-directory: client
        run: npm test --if-present

      - name: Build server package
        run: npm run build --if-present

      - name: Build client package
        working-directory: client
        run: npm run build --if-present

      - name: Bump server version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            npm version ${{ github.event.inputs.version }} --no-git-tag-version
          else
            npm version patch --no-git-tag-version
          fi
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set client version to match
        working-directory: client
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Commit version bump (signed, via GitHub API)
        id: commit
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const version = '${{ steps.version.outputs.version }}';
            const files = ['package.json', 'client/package.json'];

            const mutation = `
              mutation ($input: CreateCommitOnBranchInput!) {
                createCommitOnBranch(input: $input) {
                  commit { oid }
                }
              }
            `;

            const result = await github.graphql(mutation, {
              input: {
                branch: {
                  repositoryNameWithOwner: `${context.repo.owner}/${context.repo.repo}`,
                  branchName: 'main',
                },
                message: { headline: `chore: bump version to v${version} [skip ci]` },
                fileChanges: {
                  additions: files.map((path) => ({
                    path,
                    contents: Buffer.from(fs.readFileSync(path, 'utf8')).toString('base64'),
                  })),
                },
                expectedHeadOid: context.sha,
              },
            });

            core.setOutput('sha', result.createCommitOnBranch.commit.oid);

      - name: Create version tag
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/v${version}`,
              sha: '${{ steps.commit.outputs.sha }}',
            });

      - name: Publish server package to npm
        run: npm publish --access public --provenance

      - name: Publish client package to npm
        working-directory: client
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true